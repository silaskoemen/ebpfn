defaults:
  - _self_
  - offline_validation_mode: fast

version: offline-validation-training-panel-1

arch:
  n_bins: 256
  target_inner_bound: 5.0
  target_tail_scale: 1.0
  embed_dim: 128
  col_num_blocks: 3
  row_num_blocks: 3
  icl_num_blocks: 12
  col_nhead: 8
  row_nhead: 8
  icl_nhead: 8
  feature_group_size: 3
  n_cls_cols: 4
  n_cls_rows: 128
  max_context: 1024

train:
  seed: 0
  steps: 1000
  tasks_per_step: 1
  gradient_accumulation_steps: 16
  lr: 3e-4
  weight_decay: 0.01
  warmup_steps: 100
  grad_clip: 1.0
  device: auto
  checkpoint_interval: 50
  anchor_probe_fit: 512
  anchor_probe_score: 128
  anchor_features: 100
  jitter:
    sigma_n: 0.4
    sigma_p: 0.2
    n_min: 32
    n_max: 1024
    p_min: 1
    p_max: 100

characterization_dir: benchmarks/results/characterization
source_role: pilot
coverage_levels: [0.5, 0.8, 0.9, 0.95]
crps_grid_size: 256
metric_row_chunk_size: 64
decision_owner: ebpfn-v1
decision_date: "2026-07-15"
