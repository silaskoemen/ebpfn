hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=MULTIRUN
    task:
    - dataset=concrete
    - max_rows=1000,3000
    - max_features=50
  job:
    name: characterize
    chdir: null
    override_dirname: dataset=concrete,max_features=50,max_rows=1000,3000
    id: ???
    num: ???
    config_name: characterization
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.4
    version_base: '1.3'
    cwd: /Users/silaskoemen/Documents/Projects/ebpfn
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /Users/silaskoemen/Documents/Projects/ebpfn/configs
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: ???
    choices:
      characterization_mode: fast
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
mode:
  name: fast
repeats: 1
max_rows: 256
max_features: 50
dataset: concrete
output_root: benchmarks/results/characterization
probe_score_fraction: 0.25
characterization:
  version: characterization-1
  seed: 0
  repeat: 0
  representation: raw
  include_observation_coordinates: true
  target_clip: 5.0
  target_scale_epsilon: 1.0e-12
  row_budgets:
    minimum: 256
    spacing: geometric
    weight: uniform
    feature_view: frozen
  maps:
    bin_quantiles:
    - 0.125
    - 0.25
    - 0.375
    - 0.5
    - 0.625
    - 0.75
    - 0.875
    max_products: 128
    max_conjunctions: 128
    max_rff: 256
    rff_distance_rows: 1024
    conjunction_min_prevalence: 0.05
    conjunction_max_prevalence: 0.95
  ridge:
    lambda_: 0.01
    gain_epsilon: 1.0e-12
    column_tolerance: 1.0e-12
ridge_candidates:
- 0.0001
- 0.001
- 0.01
- 0.1
decision_owner: ebpfn-v1
decision_date: '2026-07-06'
applicability_max_rows: 640
applicability_max_features: 100
