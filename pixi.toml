[workspace]
name = "ebpfn"
version = "0.1.0"
description = "Empirical-Bayes prior tuning for tabular regression PFNs."
authors = ["Silas Koemen <kpsilas@gmail.com>"]
channels = ["conda-forge"]
platforms = ["osx-arm64"]

[tasks]
setup = "pre-commit install && pip install -e ."
test = "pytest"
prepare-data = "python -m scripts.prepare_data"
characterize = "python -m benchmarks.studies.characterize"
prior-audit = "python -m benchmarks.studies.prior"
clean = "rm -rf build dist *.egg-info .pytest_cache .ruff_cache catboost_info"

[dependencies]
python = ">=3.11,<3.13"
pip = "*"
hatchling = "*"
loguru = ">=0.7.3,<0.8"
numpy = ">=2.4.6,<3"
polars = ">=1.41.2,<2"
pydantic = ">=2.12,<3"

[pypi-dependencies]
ebpfn = { path = ".", editable = true }

[feature.test.dependencies]
pytest = ">=9.1.0,<10"

[feature.bench.pypi-dependencies]
hydra-core = ">=1.3.2,<2"
openml = ">=0.15.1,<0.16"
pandas = ">=2.0,<3"

[feature.lint.dependencies]
ruff = "*"
black = "*"
pre-commit = "*"
ty = ">=0.0.47"

[feature.lint.tasks]
lint = "pre-commit run -a"

[feature.dev.dependencies]
ipykernel = "*"

[feature.build.dependencies]
python-build = "*"
twine = "*"

[feature.build.tasks]
build-wheel = "python -m build --no-isolation ."
check-wheel = "twine check dist/*"

[environments]
default = ["bench", "test", "lint", "dev"]
core = []
bench = ["bench"]
test = ["test"]
lint = ["lint"]
build = ["build"]
