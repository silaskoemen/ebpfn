[workspace]
name = "ebpfn"
version = "0.1.0"
description = "Empirical-Bayes PFN experiments for conditional-structure coverage on tabular regression tasks."
authors = ["Silas Koemen <kpsilas@gmail.com>"]
channels = ["conda-forge"]
platforms = ["osx-arm64"]

[tasks]
test = "pytest -q"
smoke = "python benchmarks/scripts/smoke.py"
sweep = "python benchmarks/scripts/run_sweep.py"
gate1 = "python benchmarks/scripts/run_gate1.py"
gate2 = "python benchmarks/scripts/run_gate2.py"
gate2-quick = "python benchmarks/scripts/run_gate2.py --quick"
lint = "ruff check ebpfn tests benchmarks"
format = "ruff format ebpfn tests benchmarks"
clean = "rm -rf build dist *.egg-info .pytest_cache .ruff_cache catboost_info"

[activation.env]
# torch + catboost/lightgbm each link a libomp; allow the duplicate (standard macOS workaround).
KMP_DUPLICATE_LIB_OK = "TRUE"

[dependencies]
python = ">=3.11,<3.13"
pip = "*"
hatchling = "*"

[pypi-dependencies]
ebpfn = { path = ".", editable = true }

[feature.test.dependencies]
pytest = ">=9.1.0,<10"

[feature.lint.dependencies]
ruff = "*"
black = "*"
pre-commit = "*"

[feature.dev.dependencies]
ipykernel = "*"

[feature.build.dependencies]
python-build = "*"
twine = "*"

[feature.build.tasks]
build-wheel = "python -m build --no-isolation ."
check-wheel = "twine check dist/*"

[environments]
default = ["test", "lint", "dev"]
test = ["test"]
lint = ["lint"]
build = ["build"]
